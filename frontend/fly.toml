# Fly.io Frontend Configuration
app = "collab-frontend-ece1779"
primary_region = "yyz"

[build]
  dockerfile = "./Dockerfile"
  [build.args]
    VITE_API_URL = "https://collab-backend-ece1779.fly.dev"
    VITE_SOCKET_URL = "https://collab-backend-ece1779.fly.dev"

[http_service]
  internal_port = 5173
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
