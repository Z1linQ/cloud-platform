version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-collab_db}
      POSTGRES_USER: ${POSTGRES_USER:-collab_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-collab_password}
    ports:
      - target: 5432
        published: 5432
        protocol: tcp
        mode: host
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-collab_user} -d ${POSTGRES_DB:-collab_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - collab_net
    deploy:
      restart_policy:
        condition: on-failure

  backend:
    image: collab_backend:swarm
    environment:
      PORT: ${BACKEND_PORT:-3000}
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-collab_user}:${POSTGRES_PASSWORD:-collab_password}@db:5432/${POSTGRES_DB:-collab_db}?schema=public
      JWT_SECRET: ${JWT_SECRET:-change_this_super_secret_key}
      CLIENT_URL: http://localhost:${FRONTEND_PORT:-5173}
    ports:
      - target: 3000
        published: ${BACKEND_PORT:-3000}
        protocol: tcp
        mode: ingress
    command: sh -c "npx prisma migrate deploy && npx prisma generate && npm run start"
    networks:
      - collab_net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s

  frontend:
    image: collab_frontend:swarm
    environment:
      VITE_API_URL: http://localhost:${BACKEND_PORT:-3000}
      VITE_SOCKET_URL: http://localhost:${BACKEND_PORT:-3000}
    ports:
      - target: 5173
        published: ${FRONTEND_PORT:-5173}
        protocol: tcp
        mode: ingress
    command: sh -c "npm run build && npm run preview -- --host 0.0.0.0 --port 5173"
    networks:
      - collab_net
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - target: 9090
        published: 9090
        protocol: tcp
        mode: ingress
    volumes:
      - prometheus_data:/prometheus
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - collab_net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  grafana:
    image: grafana/grafana:11.2.2
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    ports:
      - target: 3000
        published: 3001
        protocol: tcp
        mode: ingress
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - collab_net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

volumes:
  pgdata:
  prometheus_data:
  grafana_data:

networks:
  collab_net:
    driver: overlay
    attachable: true
